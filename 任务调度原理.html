<h1>RTOS 任务调度原理</h1>

<div class="card">
<h2>什么是任务调度</h2>
<p>
任务调度是 RTOS 的核心，用于决定<strong>哪个任务在何时运行</strong>。
</p>
</div>

<div class="card">
<h2>调度方式</h2>
<p>
✔ 优先级调度：优先执行高优先级任务<br>
✔ 时间片轮转：同优先级轮流执行<br>
✔ 抢占式调度：高优先级可打断低优先级
</p>
</div>

<div class="card">
<h2>调度流程</h2>
<p>
系统根据任务状态（就绪、运行、阻塞）选择最优任务执行，
当发生中断或状态变化时触发重新调度。
</p>
</div>

<div class="card">
<h2>调度的重要性</h2>
<p>
调度算法直接影响系统实时性、响应速度和资源利用率，
是 RTOS 最核心的设计部分。
</p>
</div>

<div class="card">
<h2>HRTOS 调度特点</h2>
<p>
采用优先级抢占机制，支持动态调整，提高灵活性与实时性能。
</p>
</div>
