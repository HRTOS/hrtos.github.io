name: Auto Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sitemap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -name "*.html" \
            ! -path "./.git/*" \
            ! -path "./components/*" | while read file; do

            path=$(echo "$file" | sed 's|^\./||')

            # 统一 index 处理（目录化）
            if [[ "$path" == */index.html ]]; then
              path=$(echo "$path" | sed 's|index.html||')
            fi

            # 首页
            if [[ "$path" == "index.html" || "$path" == "" ]]; then
              url="https://hrtos.com/"
              priority="1.0"

            # 核心入口页（权重最高文档结构）
            elif [[ "$path" == "docs/" || "$path" == "guide/" ]]; then
              url="https://hrtos.com/$path"
              priority="0.95"

            # 二级分类目录
            elif [[ "$path" == docs/*/ || "$path" == guide/*/ ]]; then
              url="https://hrtos.com/$path"
              priority="0.85"

            # docs / guide 单页内容
            elif [[ "$path" == docs/* || "$path" == guide/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.75"

            # 其他页面
            else
              url="https://hrtos.com/$path"
              priority="0.6"
            fi

            # 防止双斜杠
            url=$(echo "$url" | sed 's|//|/|g' | sed 's|:/|://|')

            # git lastmod（真实更新时间）
            lastmod=$(git log -1 --format="%ad" --date=short -- "$file" 2>/dev/null)

            if [[ -z "$lastmod" ]]; then
              lastmod=$(date +%F)
            fi

            echo "  <url>" >> sitemap.xml
            echo "    <loc>$url</loc>" >> sitemap.xml
            echo "    <lastmod>$lastmod</lastmod>" >> sitemap.xml
            echo "    <priority>$priority</priority>" >> sitemap.xml
            echo "  </url>" >> sitemap.xml

          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "update sitemap" || echo "No changes"
          git push
