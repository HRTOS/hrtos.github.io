name: Auto Sitemap

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sitemap:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate sitemap.xml
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -name "*.html" \
            ! -path "./.git/*" \
            ! -path "./components/*" | while read file; do

            path=$(echo "$file" | sed 's|^\./||')

            # index 处理
            if [[ "$path" == */index.html ]]; then
              path=$(echo "$path" | sed 's|index.html||')
            fi

            # =========================
            # 首页
            # =========================
            if [[ "$path" == "index.html" || "$path" == "" ]]; then
              url="https://hrtos.com/"
              priority="1.0"

            # =========================
            # System View（最高权重核心）
            # =========================
            elif [[ "$path" == system-view/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.95"

            # =========================
            # Docs 核心入口
            # =========================
            elif [[ "$path" == docs/index.html || "$path" == docs/ ]]; then
              url="https://hrtos.com/docs/"
              priority="0.95"

            # =========================
            # Architecture（核心知识层）
            # =========================
            elif [[ "$path" == docs/architecture/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.90"

            # =========================
            # Modules（API核心）
            # =========================
            elif [[ "$path" == docs/modules/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.88"

            # =========================
            # API 层
            # =========================
            elif [[ "$path" == docs/api/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.85"

            # =========================
            # Learn（知识解释层）
            # =========================
            elif [[ "$path" == docs/learn/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.80"

            # =========================
            # Examples（示例）
            # =========================
            elif [[ "$path" == docs/examples/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.75"

            # =========================
            # Why（理论层）
            # =========================
            elif [[ "$path" == why/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.80"

            # =========================
            # System View 其他页
            # =========================
            elif [[ "$path" == system-view/* ]]; then
              url="https://hrtos.com/$path"
              priority="0.90"

            # =========================
            # download / misc
            # =========================
            else
              url="https://hrtos.com/$path"
              priority="0.60"
            fi

            # lastmod
            lastmod=$(git log -1 --format="%ad" --date=short -- "$file" 2>/dev/null)
            if [[ -z "$lastmod" ]]; then
              lastmod=$(date +%F)
            fi

            echo "  <url>" >> sitemap.xml
            echo "    <loc>$url</loc>" >> sitemap.xml
            echo "    <lastmod>$lastmod</lastmod>" >> sitemap.xml
            echo "    <priority>$priority</priority>" >> sitemap.xml
            echo "  </url>" >> sitemap.xml

          done

          echo '</urlset>' >> sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git commit -m "update sitemap" || echo "No changes"
          git push