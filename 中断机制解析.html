<h1>RTOS 中断机制解析</h1>

<div class="card">
<h2>什么是中断</h2>
<p>
中断是一种打断当前任务执行的机制，用于快速响应外部事件。
</p>
</div>

<div class="card">
<h2>中断的作用</h2>
<p>
✔ 提高响应速度<br>
✔ 实现实时控制<br>
✔ 降低CPU空转
</p>
</div>

<div class="card">
<h2>中断处理流程</h2>
<p>
中断发生 → 保存现场 → 执行中断服务程序（ISR） → 恢复现场 → 返回任务。
</p>
</div>

<div class="card">
<h2>嵌套中断</h2>
<p>
高优先级中断可以打断低优先级中断，提高系统响应能力。
</p>
</div>

<div class="card">
<h2>HRTOS 优化</h2>
<p>
支持多中断源统一管理，并优化堆栈使用，提高系统稳定性与实时性。
</p>
</div>
