<h1>RTOS 是什么</h1>

<h2>RTOS 的定义</h2>
<p>
RTOS（Real-Time Operating System，实时操作系统）是一种专门为嵌入式系统设计的操作系统，
其核心目标是在严格时间约束下完成任务处理。
</p>

<h2>RTOS 的核心特点</h2>
<ul>
<li>确定性：任务在规定时间内完成</li>
<li>多任务调度：支持多个任务同时运行</li>
<li>中断响应快：适合实时控制</li>
<li>资源占用小：适用于单片机</li>
</ul>

<h2>RTOS 的应用场景</h2>
<p>
RTOS 广泛应用于工业控制、汽车电子、智能家居、医疗设备等领域。
</p>

<h2>HRTOS 简介</h2>
<p>
HRTOS 是一个轻量级实时操作系统，支持多任务调度、中断管理与内存控制，
适合嵌入式开发学习与项目实践。
</p>
