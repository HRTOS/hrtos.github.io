<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>HRTOS 系统手册</title>

<meta name="description" content="HRTOS RTOS documentation center">


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0f172a;
  --panel:#0f172a;
  --surface:rgba(15,23,42,0.7);
  --border:rgba(148,163,184,0.18);
  --accent:#38bdf8;
  --muted:#94a3b8;
  --text:#e2e8f0;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display:flex;
  flex-direction:column;
}

/* ================= 顶栏 ================= */
.topbar{
  height:54px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 18px;
  background:rgba(15,23,42,0.95);
  border-bottom:1px solid var(--border);
}

.topbar .logo{
  color:var(--accent);
  font-weight:700;
}

.topbar a{
  color:var(--muted);
  margin-left:14px;
  text-decoration:none;
}
.topbar a:hover{color:var(--accent)}

/* ================= 主体 ================= */
.main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ================= 左侧导航（完整树） ================= */
#sidebar{
  width:320px;
  background:#0f172a;
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:12px;
}

.group-title{
  font-size:12px;
  color:#64748b;
  margin:18px 0 6px;
  padding-left:6px;
  border-left:2px solid rgba(56,189,248,0.3);
}

.item{
  font-size:14px;
  padding:8px 10px;
  border-radius:6px;
  cursor:pointer;
  color:#cbd5e1;
  transition:.2s;
}

.item:hover{
  background:#1e293b;
  color:var(--accent);
}

.item.active{
  background:#1e40af;
  color:white;
}

/* ================= 右侧内容 ================= */
#content{
  flex:1;
  padding:26px;
  overflow-y:auto;
}

/* markdown */
#content h1,h2,h3{color:var(--accent)}
#content code{background:#111827;padding:2px 6px;border-radius:4px}
#content pre{
  background:#0f172a;
  border:1px solid var(--border);
  padding:12px;
  border-radius:8px;
  overflow-x:auto;
}

/* ================= 首页 ================= */
.hero{
  padding:18px 0 20px;
  border-bottom:1px solid var(--border);
}

.hero h1{
  margin:0;
  font-size:2.4rem;
}

.hero p{
  color:var(--muted);
  max-width:900px;
}

/* 卡片 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-top:20px;
}

.card{
  background:linear-gradient(180deg,rgba(30,41,59,0.7),rgba(15,23,42,0.95));
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(56,189,248,0.5);
}

.card h3{margin:0}
.card p{color:var(--muted);font-size:14px}

@media(max-width:900px){
  #sidebar{width:240px}
  .grid{grid-template-columns:1fr}
}

@media (max-width: 768px) {

  /* 1. 主布局改成上下结构 */
  .main{
    flex-direction: column;
  }

  /* 2. sidebar 变成顶部全宽 */
  #sidebar{
    width: 100%;
    height: auto;
    max-height: 240px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  /* 3. 内容区适配 */
  #content{
    padding: 14px;
  }

  /* 4. 卡片改为单列 */
  .grid{
    grid-template-columns: 1fr;
  }

  /* 5. 顶栏字体稍微缩小 */
  .topbar{
    flex-wrap: wrap;
    height: auto;
    padding: 10px;
  }

  .topbar a{
    margin-left: 8px;
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <a href="https://hrtos.com/index.html" style="color:#38bdf8;text-decoration:none;">HRTOS</a>
  </div>

  <div>
    <a href="https://hrtos.com/index.html">首页</a>
    <a href="https://hrtos.com/docs/index.html">Docs</a>
    <a href="https://hrtos.com/docs/api_v2/index.html">API</a>
    <a href="https://hrtos.com/docs/examples/index.html">示例</a>
    <a href="https://hrtos.com/download/index.html">下载</a>
  </div>
</div>

<div class="main">

  <div id="sidebar"></div>
  <div id="content"></div>

</div>

<script>

/* =========================
   🚨 完整文档结构（未删减）
   ========================= */
const docs = [
    { group: "内核系统", file: "README.md", name: "系统总览" },
    { group: "内核系统", file: "01_kernel_overview.md", name: "内核概述" },
    { group: "内核系统", file: "02_directory_analysis.md", name: "目录结构分析" },

    { group: "调度系统", file: "03_scheduler_design.md", name: "调度器设计" },

    { group: "任务系统", file: "04_task_management.md", name: "任务管理" },

    { group: "通信机制", file: "05_event_design.md", name: "事件机制" },
    { group: "通信机制", file: "06_queue_design.md", name: "消息队列" },
    { group: "通信机制", file: "07_mutex_design.md", name: "互斥锁" },
    { group: "通信机制", file: "08_semaphore_design.md", name: "信号量" },

    { group: "内核系统", file: "09_timer_system.md", name: "定时系统" },
    { group: "中断系统", file: "10_interrupt_design.md", name: "中断管理" },

    { group: "内存管理", file: "11_memory_layout.md", name: "内存布局" },

    { group: "移植层", file: "12_porting_layer.md", name: "移植层" },

    { group: "内核系统", file: "13_kernel_startup.md", name: "内核启动" },

    { group: "设计模型", file: "14_state_machine.md", name: "状态机设计" },
    { group: "设计模型", file: "15_module_dependencies.md", name: "模块依赖" },
    { group: "设计模型", file: "16_call_flow.md", name: "调用流程" },

    { group: "数据结构", file: "17_data_structures.md", name: "数据结构" },

    { group: "设计原则", file: "18_design_principles.md", name: "设计原则" },

    { group: "扩展指南", file: "19_extension_guide.md", name: "扩展指南" },

    { group: "调试工具", file: "20_debugging.md", name: "调试方法" }
];

const sidebar = document.getElementById("sidebar");
const content = document.getElementById("content");

/* =========================
   构建左侧完整树
   ========================= */
const groups = {};

docs.forEach(d=>{
    if(!groups[d.group]) groups[d.group]=[];
    groups[d.group].push(d);
});

for(const g in groups){

    const gt = document.createElement("div");
    gt.className="group-title";
    gt.innerText=g;
    sidebar.appendChild(gt);

    groups[g].forEach(d=>{

        const item=document.createElement("div");
        item.className="item";
        item.innerText=d.name;
        item.dataset.file=d.file;

        item.onclick=()=>loadDoc(d.file);

        sidebar.appendChild(item);
    });
}

/* =========================
   首页
   ========================= */
function showHome(){
    content.innerHTML=`
      <div class="hero">
        <h1>HRTOS 系统手册</h1>
        <p>轻量级实时操作系统 · 内核 / 调度 / IPC / 内存管理完整参考</p>
      </div>

      <div class="grid">

        <div class="card" onclick="location.hash='01_kernel_overview'">
          <h3>📌 内核系统</h3>
          <p>任务调度 / 生命周期 / 内核结构</p>
        </div>

        <div class="card" onclick="location.hash='03_scheduler_design'">
          <h3>⚡ 调度系统</h3>
          <p>优先级调度 / 时间片 / 抢占机制</p>
        </div>

        <div class="card" onclick="location.hash='05_event_design'">
          <h3>🔗 通信机制</h3>
          <p>信号量 / 队列 / 事件 / 互斥锁</p>
        </div>

        <div class="card" onclick="location.hash='11_memory_layout'">
          <h3>🧠 内存管理</h3>
          <p>栈 / 堆 / 内存保护 / 分配策略</p>
        </div>

        <div class="card" onclick="location.hash='10_interrupt_design'">
          <h3>⚙️ 中断系统</h3>
          <p>嵌套中断 / 延迟 / 优先级</p>
        </div>

        <div class="card" onclick="location.hash='20_debugging'">
          <h3>🛠 调试工具</h3>
          <p>日志 / 断点 / 运行分析</p>
        </div>

      </div>
    `;
}

/* =========================
   加载 MD
   ========================= */
async function loadDoc(file){

    try{

        setActive(file);

        content.innerHTML="Loading...";

        const res=await fetch("./"+file);
        const text=await res.text();

        content.innerHTML=marked.parse(text);

        location.hash=file.replace(".md","");

    }catch(e){
        content.innerHTML="❌ 加载失败："+file;
    }
}

/* =========================
   高亮
   ========================= */
function setActive(file){
    document.querySelectorAll(".item").forEach(el=>{
        el.classList.toggle("active",el.dataset.file===file);
    });
}

/* =========================
   hash支持
   ========================= */
function loadFromHash(){
    const hash=location.hash.replace("#","");
    if(!hash) return showHome();

    const target=docs.find(d=>d.file.includes(hash));
    if(target) loadDoc(target.file);
    else showHome();
}

loadFromHash();
window.onhashchange=loadFromHash;

</script>

</body>
</html>
