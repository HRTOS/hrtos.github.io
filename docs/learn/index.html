<style>
:root{
  --bg:#0b1220;
  --card:#111c2e;
  --border:rgba(148,163,184,.18);
  --text:#e2e8f0;
  --muted:#94a3b8;
  --accent:#38bdf8;

/* ================= BASE ================= */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, "PingFang SC";
  background:var(--bg);
  color:var(--text);
}

a{
  color:var(--accent);
  text-decoration:none;
}
a:hover{opacity:.85;}

/* ================= NAV ================= */
.navbar{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  padding:14px 22px;
  background:rgba(11,18,32,.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}

.navbar .logo{
  font-weight:700;
  color:#7dd3fc;
}

.navbar a{
  margin-left:14px;
  color:var(--muted);
}

/* ================= LAYOUT ================= */
.page{
  width:min(1200px, calc(100% - 32px));
  margin:0 auto;
  padding:40px 0 60px;
}

h1{
  font-size:40px;
  margin:0 0 10px;
}

p{
  color:var(--muted);
  line-height:1.7;
}

/* ================= GRAPH ================= */
.graph{
  margin-top:20px;
  height:820px;
  border:1px solid var(--border);
  border-radius:14px;
  position:relative;
  overflow:hidden;
}

/* ================= GRID ================= */
.grid{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(2, minmax(0,1fr));
  gap:18px;
}

/* 防止错位关键 */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  min-width:0;
  overflow:hidden;
}

.card h3{
  margin:0 0 10px;
  font-size:16px;
}

.card a{
  display:block;
  padding:4px 0;
  font-size:14px;
  color:#7dd3fc;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ================= FOOTER ================= */
footer{
  margin-top:40px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
  padding-top:20px;
  border-top:1px solid var(--border);
}

/* ================= RESPONSIVE ================= */
@media (max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
