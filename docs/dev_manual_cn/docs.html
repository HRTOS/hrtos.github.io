<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>HRTOS 系统文档</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* ================= 左侧 ================= */
#sidebar {
    width: 300px;
    background: #0f172a;
    color: #fff;
    overflow-y: auto;
    padding: 12px;
}

.group {
    font-size: 12px;
    color: #64748b;
    margin: 18px 0 6px;
    padding-left: 6px;
}

.item {
    font-size: 14px;
    padding: 8px 10px;
    margin: 2px 0;
    border-radius: 6px;
    cursor: pointer;
    color: #cbd5e1;
    transition: 0.2s;
}

.item:hover {
    background: #1e293b;
    color: #38bdf8;
}

.item.active {
    background: #1e40af;
    color: #fff;
}

/* ================= 右侧 ================= */
#content {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
    background: #0b1220;
    color: #e2e8f0;
    line-height: 1.6;
}

#content h1, h2, h3 {
    color: #38bdf8;
}

#content code {
    background: #111827;
    padding: 2px 6px;
    border-radius: 4px;
}

#content pre {
    background: #0f172a;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    border: 1px solid #1e293b;
}
</style>
</head>

<body>

<div id="sidebar"></div>
<div id="content">加载中...</div>

<script>

// =========================
// 文档配置（中文UI）
// =========================
const docs = [
    { group: "内核系统", file: "README.md", name: "系统总览" },
    { group: "内核系统", file: "01_kernel_overview.md", name: "内核概述" },
    { group: "内核系统", file: "02_directory_analysis.md", name: "目录结构分析" },

    { group: "调度系统", file: "03_scheduler_design.md", name: "调度器设计" },

    { group: "任务系统", file: "04_task_management.md", name: "任务管理" },

    { group: "通信机制", file: "05_event_design.md", name: "事件机制" },
    { group: "通信机制", file: "06_queue_design.md", name: "消息队列" },
    { group: "通信机制", file: "07_mutex_design.md", name: "互斥锁" },
    { group: "通信机制", file: "08_semaphore_design.md", name: "信号量" },

    { group: "内核系统", file: "09_timer_system.md", name: "定时系统" },
    { group: "中断系统", file: "10_interrupt_design.md", name: "中断管理" },

    { group: "内存管理", file: "11_memory_layout.md", name: "内存布局" },

    { group: "移植层", file: "12_porting_layer.md", name: "移植层" },

    { group: "内核系统", file: "13_kernel_startup.md", name: "内核启动" },

    { group: "设计模型", file: "14_state_machine.md", name: "状态机设计" },
    { group: "设计模型", file: "15_module_dependencies.md", name: "模块依赖" },
    { group: "设计模型", file: "16_call_flow.md", name: "调用流程" },

    { group: "数据结构", file: "17_data_structures.md", name: "数据结构" },

    { group: "设计原则", file: "18_design_principles.md", name: "设计原则" },

    { group: "扩展指南", file: "19_extension_guide.md", name: "扩展指南" },

    { group: "调试工具", file: "20_debugging.md", name: "调试方法" }
];

const sidebar = document.getElementById("sidebar");
const content = document.getElementById("content");

// =========================
// 分组生成目录
// =========================
const groups = {};

docs.forEach(d => {
    if (!groups[d.group]) groups[d.group] = [];
    groups[d.group].push(d);
});

for (const g in groups) {

    const gt = document.createElement("div");
    gt.className = "group";
    gt.innerText = g;

    sidebar.appendChild(gt);

    groups[g].forEach(d => {

        const item = document.createElement("div");
        item.className = "item";
        item.innerText = d.name;
        item.dataset.file = d.file;

        item.onclick = () => loadDoc(d.file);

        sidebar.appendChild(item);
    });
}

// =========================
// 高亮
// =========================
function setActive(file) {

    document.querySelectorAll(".item").forEach(el => {
        el.classList.remove("active");
        if (el.dataset.file === file) {
            el.classList.add("active");
        }
    });
}

// =========================
// 加载 MD（同目录版）
// =========================
async function loadDoc(file) {

    try {

        setActive(file);

        location.hash = file.replace(".md", "");

        content.innerHTML = "Loading...";

        // ? 关键改动：同目录加载
        const res = await fetch("./" + file);

        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();

        content.innerHTML = marked.parse(text);

    } catch (err) {

        console.error(err);

        content.innerHTML = `
        <div style="color:#f87171">
            ? 文档加载失败<br><br>
            文件：${file}<br><br>
            检查点：<br>
            1. 是否部署到 GitHub Pages<br>
            2. MD 是否与 HTML 同目录<br>
            3. 是否直接用 file:// 打开（禁止 fetch）<br>
        </div>`;
    }
}

// =========================
// hash支持
// =========================
function loadFromHash() {

    const hash = location.hash.replace("#", "");

    if (!hash) {
        loadDoc(docs[0].file);
        return;
    }

    const target = docs.find(d => d.file.includes(hash));

    if (target) loadDoc(target.file);
    else loadDoc(docs[0].file);
}

loadFromHash();
window.onhashchange = loadFromHash;

</script>

</body>
</html>
